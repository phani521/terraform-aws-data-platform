name: EMR Terraform CI/CD

on:
  pull_request:
    paths:
      - "emr/**"
      - "modules/emr/**"
      - "modules/network/**"
  push:
    branches: [ main ]
    paths:
      - "emr/**"
      - "modules/emr/**"
      - "modules/network/**"

env:
  TF_VERSION: "1.9.5"  # Updated
  WORKING_DIR: "emr"
  AWS_REGION: "us-east-1"

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init  # 🔥 FIXED: Backend config
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=ppd-terraform-state" \
            -backend-config="key=data-platform/terraform.tfstate" \
            -backend-config="dynamodb_table=ppd-terraform-locks" \
            -input=false

      - name: Select workspace
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform workspace select ${{ github.base_ref == 'main' && 'prod' || 'dev' }} || \
          terraform workspace new ${{ github.base_ref == 'main' && 'prod' || 'dev' }}

      - name: Terraform Fmt
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan  # 🔥 FIXED: Pass env var
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_env: ${{ github.base_ref == 'main' && 'prod' || 'dev' }}
        run: terraform plan -var="env=$TF_VAR_env" -no-color -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: emr-tfplan
          path: ${{ env.WORKING_DIR }}/tfplan

  apply:
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production  # 🔥 Manual approval here!

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: emr-tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Init  # 🔥 FIXED: Backend config
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=ppd-terraform-state" \
            -backend-config="key=data-platform/terraform.tfstate" \
            -backend-config="dynamodb_table=ppd-terraform-locks" \
            -input=false

      - name: Select workspace
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform workspace select prod || terraform workspace new prod

      - name: Terraform Apply  # ✅ Your exact command
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
